openapi: 3.0.3
info:
  title: FTC API
  version: 1.0.0
paths:
  /health/:
    get:
      operationId: health_check
      summary: 健康检查
      description: |-
        健康检查接口：
        - 返回 {"status":"ok"} 供探针与负载均衡使用
      tags:
      - health
      security: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: 健康状态
                    example: ok
                required:
                - status
          description: ''
  /api/auth/roles/:
    get:
      operationId: auth_roles_list
      summary: 角色列表
      description: |-
        获取角色列表（占位接口）：
        - 仅管理员可用
        - 当前返回空列表，后续将补充 RBAC 角色管理
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: 业务状态码
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                    required:
                    - items
                required:
                - code
                - message
                - data
          description: ''
  /api/auth/permissions/:
    get:
      operationId: auth_permissions_list
      summary: 权限列表
      description: |-
        获取权限列表（占位接口）：
        - 仅管理员可用
        - 返回当前内置权限清单，后续可扩展编辑能力
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                    required:
                    - items
                required:
                - code
                - message
                - data
          description: ''
  /ws/notify/:
    get:
      operationId: ws_notify
      summary: WebSocket 通知通道
      description: |-
        WebSocket 通知：
        - 连接地址：`ws(s)://<host>/ws/notify/`
        - 鉴权：Authorization Bearer Token 或 query 参数 token
        - 事件：submission_accepted、hint_unlocked、force_logout 等，payload 统一包含自增 seq
      tags:
      - websocket
      responses:
        '101':
          description: WebSocket 升级成功
  /ws/contests/{contest_slug}/:
    get:
      operationId: ws_contest_events
      summary: 比赛事件通道
      description: |-
        比赛事件 WebSocket：
        - 连接地址：`ws(s)://<host>/ws/contests/{contest_slug}/`
        - 需具备 contests.view_contest 权限
        - 事件：scoreboard_updated、team_joined、team_disbanded 等
      tags:
      - websocket
      parameters:
      - name: contest_slug
        in: path
        required: true
        schema:
          type: string
      responses:
        '101':
          description: WebSocket 升级成功
  /api/accounts/auth/captcha/:
    get:
      operationId: accounts_auth_captcha_retrieve
      description: |-
        获取登录图形验证码：
        - 返回 captcha_key 与验证码图片 URL
        - 前端需输入验证码并连同 key 传给登录接口
      summary: 获取登录图形验证码：
      tags:
      - accounts
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptchaResponse'
          description: ''
  /api/accounts/auth/login/:
    post:
      operationId: accounts_auth_login_create
      description: |-
        登录流程：
        - 校验 identifier/password
        - 校验 captcha_key/captcha_code 图形验证码
        - 执行 LoginService 获取 token 与用户信息
        - 写入 HttpOnly JWT Cookie（可配置关闭）
      summary: 登录流程：
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              登录请求示例:
                value:
                  identifier: alice 或 alice@example.com
                  password: Passw0rd123
                  captcha_key: abcd1234
                  captcha_code: XyZ1
                description: captcha_key/captcha_code 由获取验证码接口返回与输入
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                登录请求示例:
                  value:
                    identifier: alice 或 alice@example.com
                    password: Passw0rd123
                    captcha_key: abcd1234
                    captcha_code: XyZ1
                  description: captcha_key/captcha_code 由获取验证码接口返回与输入
          description: ''
  /api/accounts/auth/password/change/:
    post:
      operationId: accounts_auth_password_change_create
      description: |-
        修改密码：
        - 校验旧密码、邮箱验证码、新密码与确认密码
        - 调用服务写入新密码
      summary: 修改密码：
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePassword'
        required: true
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
          description: ''
  /api/accounts/auth/password/reset/:
    post:
      operationId: accounts_auth_password_reset_create
      description: |-
        重置密码：
        - 校验重置入参（邮箱/验证码/新密码）
        - 调用服务消费验证码并写入新密码
      summary: 重置密码：
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordReset'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordReset'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordReset'
        required: true
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetResponse'
          description: ''
  /api/accounts/auth/password/reset/request/:
    post:
      operationId: accounts_auth_password_reset_request_create
      description: |-
        申请重置：
        - 将场景设置为 RESET_PASSWORD
        - 调用发送验证码服务
      summary: 申请重置：
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetSendResponse'
          description: ''
  /api/accounts/auth/register/:
    post:
      operationId: accounts_auth_register_create
      description: |-
        提交注册：
        - 校验注册入参
        - 执行注册服务，创建用户并分配默认权限
      summary: 提交注册：
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
          description: ''
  /api/accounts/email/change/:
    post:
      operationId: accounts_email_change_create
      description: |-
        修改邮箱：
        - 校验当前密码
        - 消费绑定邮箱验证码
        - 更新邮箱并返回最新资料
      summary: 修改邮箱：
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeEmail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangeEmail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangeEmail'
        required: true
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeEmailResponse'
          description: ''
  /api/accounts/email/verification/:
    post:
      operationId: accounts_email_verification_create
      description: |-
        发送验证码：
        - 从请求体构建 SendEmailCodeSchema（自动校验）
        - 执行发送服务；DEBUG 下输出 debug_code 便于测试
      summary: 发送验证码：
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SendEmailCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SendEmailCodeRequest'
        required: true
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendEmailCodeResponse'
          description: ''
  /api/accounts/me/:
    get:
      operationId: accounts_me_retrieve
      description: 获取当前用户资料
      summary: 获取当前用户资料
      tags:
      - accounts
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDetailResponse'
          description: ''
    patch:
      operationId: accounts_me_partial_update
      description: |-
        部分更新个人资料：
        - 校验至少包含一个可更新字段
        - 调用更新服务后返回最新用户信息
      summary: 部分更新个人资料：
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProfileUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProfileUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProfileUpdate'
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileUpdateResponse'
          description: ''
  /api/accounts/me/avatar/:
    post:
      operationId: accounts_me_avatar_create
      description: |-
        上传并更新头像：
        - 校验图片类型与大小
        - 保存后返回头像 URL
      summary: 上传并更新头像
      tags:
      - accounts
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AvatarUpload'
        required: true
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadResponse'
          description: ''
  /api/accounts/me/deactivate/:
    post:
      operationId: accounts_me_deactivate_create
      description: |-
        注销流程：
        - 校验当前密码
        - 调用服务进行软删除处理（禁用账号、清除可识别信息）
      summary: 注销流程：
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccount'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeleteAccount'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeleteAccount'
        required: true
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAccountResponse'
          description: ''
  /api/contests/:
    get:
      operationId: contest_list
      description: 比赛列表/创建接口：GET 公共访问，POST 仅管理员
      summary: 比赛列表
      tags:
      - contests
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestListResponse'
          description: ''
  /api/contests/{contest_slug}/:
    get:
      operationId: contest_detail
      description: 比赛详情接口：返回比赛、挑战、公告、记分板及我的队伍
      summary: 比赛详情
      parameters:
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - contests
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestDetailResponse'
          description: ''
  /api/contests/{contest_slug}/announcements/:
    get:
      operationId: contests_announcements_retrieve
      description: |-
        比赛公告接口：
        - GET：任何人可查看比赛公告列表
        - POST：管理员创建公告
      summary: 比赛公告列表
      parameters:
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - contests
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementListResponse'
          description: ''
  /api/contests/{contest_slug}/categories/:
    get:
      operationId: contests_categories_retrieve
      description: |-
        比赛题目分类管理：
        - GET：公开查询比赛下的分类列表
        - PATCH：管理员更新比赛分类
      summary: 比赛分类列表
      parameters:
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - contests
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestCategoryListResponse'
          description: ''
  /api/contests/{contest_slug}/challenges/:
    get:
      operationId: contest_challenges_list
      description: 比赛下的题目列表/创建接口
      summary: 题目列表（按比赛）
      parameters:
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - challenges
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestChallengeListResponse'
          description: ''
  /api/contests/{contest_slug}/challenges/{challenge_slug}/:
    get:
      operationId: contest_challenge_detail
      description: 比赛下的题目详情/更新接口
      summary: 题目详情（按比赛）
      parameters:
      - in: path
        name: challenge_slug
        schema:
          type: string
        required: true
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - challenges
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestChallengeDetailResponse'
          description: ''
  /api/contests/{contest_slug}/challenges/{challenge_slug}/attachments/{attachment_id}/download/:
    get:
      operationId: contests_challenges_attachments_download_retrieve
      description: 题目附件下载：需登录，返回附件下载 URL
      summary: 下载题目附件
      parameters:
      - in: path
        name: attachment_id
        schema:
          type: integer
        required: true
      - in: path
        name: challenge_slug
        schema:
          type: string
        required: true
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - challenges
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeAttachmentDownloadResponse'
          description: ''
  /api/contests/{contest_slug}/challenges/{challenge_slug}/hints/:
    get:
      operationId: contest_challenge_hint_list
      description: 比赛下的题目提示列表
      summary: 提示列表（按比赛）
      parameters:
      - in: path
        name: challenge_slug
        schema:
          type: string
        required: true
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - challenges
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeHintListResponse'
          description: ''
  /api/contests/{contest_slug}/challenges/{challenge_slug}/hints/{hint_id}/unlock/:
    post:
      operationId: contest_challenge_hint_unlock
      description: 比赛下的题目提示解锁
      summary: 解锁提示（按比赛）
      parameters:
      - in: path
        name: challenge_slug
        schema:
          type: string
        required: true
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      - in: path
        name: hint_id
        schema:
          type: integer
        required: true
      tags:
      - challenges
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeHintUnlockResponse'
          description: ''
  /api/contests/{contest_slug}/register/:
    post:
      operationId: contest_register
      description: 报名后生成/更新参赛记录，未开赛为已报名，开赛后为进行中
      summary: 报名参赛
      parameters:
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - contests
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestRegisterResponse'
          description: ''
  /api/contests/{contest_slug}/submissions/:
    get:
      operationId: contests_submissions_retrieve
      description: |-
        查看当前用户的提交记录：
        - scope=personal（默认）：仅本人提交
        - scope=team（组队赛）：查看所在队伍的提交
      summary: 我的提交记录
      parameters:
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - submissions
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestSubmissionListResponse'
          description: ''
    post:
      operationId: contests_submissions_create
      description: 比赛作用域内提交 Flag
      summary: 比赛内提交 Flag
      parameters:
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - submissions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContestSubmissionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ContestSubmissionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContestSubmissionRequest'
        required: true
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestSubmissionResponse'
          description: ''
  /api/contests/{contest_slug}/teams/:
    get:
      operationId: contests_teams_retrieve
      description: 比赛队伍列表 / 创建接口：需登录
      summary: 比赛队伍列表
      parameters:
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - teams
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContestTeamListResponse'
          description: ''
    post:
      operationId: contests_teams_create
      description: 比赛队伍列表 / 创建接口：需登录
      summary: 创建队伍
      parameters:
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - teams
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TeamCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TeamCreateRequest'
        required: true
      security:
      - JWTAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamCreateResponse'
          description: ''
  /api/contests/{contest_slug}/teams/join/:
    post:
      operationId: contests_teams_join_create
      description: 加入队伍接口：需登录，通过邀请码加入
      summary: 加入队伍
      parameters:
      - in: path
        name: contest_slug
        schema:
          type: string
        required: true
      tags:
      - teams
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamJoinRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TeamJoinRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TeamJoinRequest'
        required: true
