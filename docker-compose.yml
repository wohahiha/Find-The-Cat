version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ftc-backend:latest
    command: ["uvicorn", "Config.asgi:application", "--host", "0.0.0.0", "--port", "8000", "--workers", "3"]
    env_file: .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./data/db/db.sqlite3:/data/db/db.sqlite3
      - ./data/media:/app/media
      - ./data/static:/app/static
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  worker:
    image: ftc-backend:latest
    env_file: .env.example
    command: ["celery", "-A", "Config", "worker", "-l", "info"]
    volumes:
      - ./data/db/db.sqlite3:/data/db/db.sqlite3
      - ./data/media:/app/media
      - ./data/static:/app/static
    depends_on:
      - redis
    restart: unless-stopped

  beat:
    image: ftc-backend:latest
    env_file: .env.example
    command: ["celery", "-A", "Config", "beat", "-l", "info"]
    volumes:
      - ./data/db/db.sqlite3:/data/db/db.sqlite3
      - ./data/media:/app/media
      - ./data/static:/app/static
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/static:/usr/share/nginx/html/static:ro
      - ./data/media:/usr/share/nginx/html/media:ro
      # 前端 SPA 构建产物（根路径托管，配合 nginx.conf 中的 / -> index.html 回退）
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
